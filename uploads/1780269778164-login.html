<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
    }
    .container {
      width: 320px;
      margin: 100px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
    }
    input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #673de6;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Entrar</button>
</div>

<script>
function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  if (!email || !password) {
    alert('Completa todos los campos');
    return;
  }

  fetch('http://localhost:3000/api/test/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      email: email,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {
    console.log(data);

    if (data.error) {
      alert(data.error);
    } else {
      localStorage.setItem('user', JSON.stringify(data.user));
      alert('Login correcto');
      window.location.href = 'dashboard.html';
    }
  })
  .catch(err => {
    console.error(err);
    alert('Error en el servidor');
  });
}
</script>

</body>
</html>
