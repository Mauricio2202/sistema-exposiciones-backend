<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
    }
    .container {
      width: 400px;
      margin: 100px auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      text-align: center;
    }
    button {
      margin-top: 20px;
      padding: 10px;
      background: #673de6;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Dashboard</h2>
  <p id="welcome"></p>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user'));

if (!user) {
  window.location.href = 'login.html';
} else {
  document.getElementById('welcome').innerText = 'Bienvenido, ' + user.nombre;
}

function logout() {
  localStorage.removeItem('user');
  window.location.href = 'login.html';
}
</script>

</body>
</html>
